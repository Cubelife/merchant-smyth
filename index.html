<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchant Smith</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #0b0f1a;
      color: white;
      padding: 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    h2, h3 {
      margin-bottom: 10px;
    }

    input, button {
      padding: 12px;
      margin: 6px 0;
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #2a3350;
      font-size: 16px;
    }

    input {
      background: #101726;
      color: white;
    }

    button {
      background: #c89b3c;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button.secondary {
      background: #2d3b63;
      color: white;
    }

    #status {
      margin: 12px 0;
      padding: 12px;
      border-radius: 8px;
      background: #111827;
      border: 1px solid #2a3350;
      white-space: pre-wrap;
    }

    pre {
      background: #111;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h2>Merchant Smith</h2>

  <h3>Setup</h3>
  <input id="url" placeholder="Project URL" />
  <input id="key" placeholder="Publishable / anon key" />
  <button id="saveBtn">Save Config</button>
  <button id="testBtn" class="secondary">Test Connection</button>

  <div id="status">Ready.</div>

  <h3>GM</h3>
  <button id="playerBtn">Create Player</button>
  <button id="shopBtn">Create Shop</button>

  <h3>Output</h3>
  <pre id="out"></pre>

  <script>
    let client = null;

    const urlInput = document.getElementById('url');
    const keyInput = document.getElementById('key');
    const statusEl = document.getElementById('status');
    const outEl = document.getElementById('out');

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function setOutput(data) {
      if (typeof data === 'string') {
        outEl.textContent = data;
      } else {
        outEl.textContent = JSON.stringify(data, null, 2);
      }
    }

    function initClient() {
      const url = urlInput.value.trim();
      const key = keyInput.value.trim();

      if (!url || !key) {
        throw new Error('Project URL and key are both required.');
      }

      client = window.supabase.createClient(url, key);
      return client;
    }

    function loadSavedConfig() {
      const savedUrl = localStorage.getItem('url') || '';
      const savedKey = localStorage.getItem('key') || '';

      urlInput.value = savedUrl;
      keyInput.value = savedKey;

      if (savedUrl && savedKey) {
        try {
          initClient();
          setStatus('Loaded saved config.');
        } catch (err) {
          setStatus('Saved config found, but failed to initialise client: ' + err.message);
        }
      }
    }

    async function saveConfig() {
      try {
        localStorage.setItem('url', urlInput.value.trim());
        localStorage.setItem('key', keyInput.value.trim());
        initClient();
        setStatus('Config saved successfully.');
        setOutput('');
      } catch (err) {
        setStatus('Save failed: ' + err.message);
      }
    }

    async function testConnection() {
      try {
        if (!client) initClient();

        setStatus('Testing connection...');
        const { data, error } = await client
          .from('shops')
          .select('*')
          .limit(10);

        if (error) throw error;

        setStatus('Connection successful.');
        setOutput(data);
      } catch (err) {
        setStatus('Connection failed: ' + err.message);
        setOutput({ error: err.message });
      }
    }

    async function createPlayer() {
      try {
        if (!client) initClient();

        setStatus('Creating player...');

        const { data: playerData, error: playerError } = await client
          .from('app_players')
          .insert({ display_name: 'Player' })
          .select()
          .single();

        if (playerError) throw playerError;

        const { error: walletError } = await client
          .from('player_wallets')
          .insert({ player_id: playerData.id, balance_cp: 10000 });

        if (walletError) throw walletError;

        setStatus('Player created.');
        setOutput(playerData);
      } catch (err) {
        setStatus('Create player failed: ' + err.message);
        setOutput({ error: err.message });
      }
    }

    async function createShop() {
      try {
        if (!client) initClient();

        setStatus('Creating shop...');

        const { data: shopData, error: shopError } = await client
          .from('shops')
          .insert({
            name: 'Test Shop',
            shop_type: 'General',
            region_type: 'city',
            price_variance_seed: 1.0
          })
          .select()
          .single();

        if (shopError) throw shopError;

        const { data: inventoryData, error: inventoryError } = await client
          .from('shop_inventory')
          .insert([
            { shop_id: shopData.id, item_name: 'Sword', list_price_gp: 10, stock_on_hand: 5 },
            { shop_id: shopData.id, item_name: 'Rope', list_price_gp: 1, stock_on_hand: 10 }
          ])
          .select();

        if (inventoryError) throw inventoryError;

        setStatus('Shop created.');
        setOutput({
          shop: shopData,
          inventory: inventoryData
        });
      } catch (err) {
        setStatus('Create shop failed: ' + err.message);
        setOutput({ error: err.message });
      }
    }

    document.getElementById('saveBtn').addEventListener('click', saveConfig);
    document.getElementById('testBtn').addEventListener('click', testConnection);
    document.getElementById('playerBtn').addEventListener('click', createPlayer);
    document.getElementById('shopBtn').addEventListener('click', createShop);

    loadSavedConfig();
  </script>
</body>
</html>
